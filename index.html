    window.getMediaPayloadObj = function(attachment, apiFormat) {
        let format_ext = "wav";
        let dataStr = attachment.url;
        
        if (dataStr.startsWith("data:")) {
            const mime = dataStr.split(';')[0].split(':')[1];
            if (mime) {
                format_ext = mime.split('/')[1] || "wav";
                if (format_ext === "mpeg") format_ext = "mp3";
            }
        }

        if (apiFormat === 'anthropic') {
            if (attachment.type === 'image') {
                if (dataStr.startsWith("data:")) {
                    return { type: "image", source: { type: "base64", media_type: dataStr.split(';')[0].split(':')[1], data: dataStr.split(',')[1] } };
                }
                return { type: "image", source: { type: "url", url: attachment.url } };
            }
            return null;
        }

        if (apiFormat === 'gemini') {
            if (attachment.type === 'image') {
                if (dataStr.startsWith("data:")) {
                    return { inlineData: { mimeType: dataStr.split(';')[0].split(':')[1], data: dataStr.split(',')[1] } };
                }
                return { fileData: { mimeType: "image/jpeg", fileUri: attachment.url } };
            }
            if (attachment.type === 'video') {
                return { fileData: { mimeType: "video/mp4", fileUri: attachment.url } };
            }
            if (attachment.type === 'audio') {
                if (dataStr.startsWith("data:")) {
                    return { inlineData: { mimeType: dataStr.split(';')[0].split(':')[1], data: dataStr.split(',')[1] } };
                }
                return { fileData: { mimeType: "audio/mp3", fileUri: attachment.url } };
            }
            return null;
        }

        if (attachment.type === 'image') {
            if (dataStr.startsWith("data:")) return { type: "image_url", image_url: { url: dataStr } };
            return { type: "image_url", image_url: { url: attachment.url } };
        }
        if (attachment.type === 'video') return { type: "video_url", video_url: { url: attachment.url, fps: 2, media_resolution: "default" } };
        if (attachment.type === 'audio') {
            if (dataStr.startsWith("data:")) return { type: "input_audio", input_audio: { data: dataStr.split(',')[1], format: format_ext } };
            return { type: "input_audio", input_audio: { data: attachment.url } };
        }
        return null;
    };

    window.sendToProvider = async function(providerId, modelId, messages, options, abortSignal) {
        var prov = AI_PROVIDERS[providerId];
        var apiKey = window.getApiKey(providerId);
        if (!apiKey) throw new Error('未设置 API Key');

        if (prov.format === 'openai') {
            var res = await fetch(PROXY, {
                method: 'POST', signal: abortSignal,
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey, 'api-key': apiKey, 'x-target-url': prov.apiBase },
                body: JSON.stringify(Object.assign({ model: modelId, messages: messages, stream: true }, options || {}))
            });
            if (!res.ok) {
                var errBody = null;
                try { errBody = await res.json(); } catch(e) {}
                var err = new Error(window.parseProviderError(providerId, res.status, errBody));
                err._httpStatus = res.status; err._response = errBody; err._parsedMsg = err.message;
                throw err;
            }
            return { response: res, format: 'openai' };
        }

        if (prov.format === 'anthropic') {
            var sysMsg = messages.find(function(m) { return m.role === 'system'; });
            var chatMsgs = messages.filter(function(m) { return m.role !== 'system'; });
            var anthropicBody = { model: modelId, max_tokens: 8192, messages: chatMsgs, stream: true };
            if (sysMsg) anthropicBody.system = sysMsg.content;
            var res = await fetch(prov.apiBase, {
                method: 'POST', signal: abortSignal,
                headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
                body: JSON.stringify(anthropicBody)
            });
            if (!res.ok) {
                var errBody = null;
                try { errBody = await res.json(); } catch(e) {}
                var err = new Error(window.parseProviderError(providerId, res.status, errBody));
                err._httpStatus = res.status; err._response = errBody; err._parsedMsg = err.message;
                throw err;
            }
            return { response: res, format: 'anthropic' };
        }

        if (prov.format === 'gemini') {
            var contents = messages.filter(function(m) { return m.role !== 'system'; }).map(function(m) {
                return { role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.content || '' }] };
            });
            var sysMsg = messages.find(function(m) { return m.role === 'system'; });
            var geminiBody = { contents: contents, generationConfig: { maxOutputTokens: 8192 } };
            if (sysMsg) geminiBody.systemInstruction = { parts: [{ text: sysMsg.content }] };
            var url = prov.apiBase + '/' + modelId + ':streamGenerateContent?alt=sse&key=' + apiKey;
            var res = await fetch(url, {
                method: 'POST', signal: abortSignal,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(geminiBody)
            });
            if (!res.ok) {
                var errBody = null;
                try { errBody = await res.json(); } catch(e) {}
                var err = new Error(window.parseProviderError(providerId, res.status, errBody));
                err._httpStatus = res.status; err._response = errBody; err._parsedMsg = err.message;
                throw err;
            }
            return { response: res, format: 'gemini' };
        }

        if (prov.format === 'ernie') {
            var parts = apiKey.split(':');
            var tokenRes = await fetch('https://aip.baidubce.com/oauth/2.0/token?grant_type=client_credentials&client_id=' + parts[0] + '&client_secret=' + parts[1], { method: 'POST' });
            var tokenData = await tokenRes.json();
            var ernieUrl = prov.apiBase + '/rpc/2.0/ai_custom/v1/wenxinworkshop/chat/' + modelId + '?access_token=' + tokenData.access_token;
            var ernieBody = { messages: messages, stream: true };
            if (options && options.thinking) ernieBody.enable_thinking = true;
            var res = await fetch(ernieUrl, {
                method: 'POST', signal: abortSignal,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(ernieBody)
            });
            if (!res.ok) {
                var errBody = null;
                try { errBody = await res.json(); } catch(e) {}
                var err = new Error(window.parseProviderError(providerId, res.status, errBody));
                err._httpStatus = res.status; err._response = errBody; err._parsedMsg = err.message;
                throw err;
            }
            return { response: res, format: 'ernie' };
        }

        if (prov.format === 'spark') {
            var res = await fetch(prov.apiBase, {
                method: 'POST', signal: abortSignal,
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                body: JSON.stringify({ model: modelId, messages: messages, stream: true })
            });
            if (!res.ok) {
                var errBody = null;
                try { errBody = await res.json(); } catch(e) {}
                var err = new Error(window.parseProviderError(providerId, res.status, errBody));
                err._httpStatus = res.status; err._response = errBody; err._parsedMsg = err.message;
                throw err;
            }
            return { response: res, format: 'spark' };
        }

        throw new Error('未知的 API 格式: ' + prov.format);
    };

    window.parseStreamDelta = function(format, line) {
        if (format === 'openai' || format === 'spark') {
            if (!line.startsWith('data: ')) return null;
            var dataStr = line.replace('data: ', '').trim();
            if (dataStr === '[DONE]') return { done: true };
            try {
                var json = JSON.parse(dataStr);
                var delta = json.choices?.[0]?.delta;
                var result = {};
                if (delta) {
                    if (delta.reasoning_content) result.reasoning = delta.reasoning_content;
                    if (delta.content) result.content = delta.content;
                }
                if (json.usage && json.usage.total_tokens) result.usage = { total: json.usage.total_tokens, prompt: json.usage.prompt_tokens, completion: json.usage.completion_tokens };
                return result;
            } catch(e) { return null; }
        }
        if (format === 'anthropic') {
            if (!line.startsWith('data: ')) return null;
            try {
                var json = JSON.parse(line.replace('data: ', ''));
                if (json.type === 'content_block_delta') return { content: json.delta?.text || '' };
                if (json.type === 'message_delta' && json.usage) return { usage: { total: (json.usage.input_tokens||0)+(json.usage.output_tokens||0), prompt: json.usage.input_tokens, completion: json.usage.output_tokens } };
                return null;
            } catch(e) { return null; }
        }
        if (format === 'gemini') {
            if (!line.startsWith('data: ')) return null;
            try {
                var json = JSON.parse(line.replace('data: ', ''));
                var text = json.candidates?.[0]?.content?.parts?.[0]?.text;
                return text ? { content: text } : null;
            } catch(e) { return null; }
        }
        if (format === 'ernie') {
            if (!line.startsWith('data: ')) return null;
            try {
                var json = JSON.parse(line.replace('data: ', ''));
                var result = {};
                if (json.result) result.content = json.result;
                if (json.usage) result.usage = { total: json.usage.total_tokens, prompt: json.usage.prompt_tokens, completion: json.usage.completion_tokens };
                return Object.keys(result).length ? result : null;
            } catch(e) { return null; }
        }
        return null;
    };

    window.ttsWithProvider = async function(providerId, text, voice) {
        var prov = AI_PROVIDERS[providerId];
        var apiKey = window.getApiKey(providerId);
        if (!apiKey) throw new Error('未设置 API Key');

        if (providerId === 'mimo') {
            var res = await fetch(PROXY, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey, 'api-key': apiKey, 'x-target-url': 'https://api.xiaomimimo.com/v1/chat/completions' },
                body: JSON.stringify({ model: 'mimo-v2.5-tts', messages: [{ role: 'user', content: '请根据语境朗读：' }, { role: 'assistant', content: text.substring(0, 1000) }], stream: false, audio: { format: 'wav', voice: voice || 'mimo_default' } })
            });
            if (!res.ok) throw new Error('TTS 请求失败');
            var data = await res.json();
            var audioData = data.choices?.[0]?.message?.audio?.data;
            if (!audioData) throw new Error('TTS 返回为空');
            return 'data:audio/wav;base64,' + audioData;
        }

        if (prov.ttsApi) {
            var res = await fetch(prov.ttsApi, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                body: JSON.stringify({ model: 'tts-1', input: text.substring(0, 4000), voice: voice || 'alloy', response_format: 'mp3' })
            });
            if (!res.ok) throw new Error('TTS 请求失败');
            var blob = await res.blob();
            return URL.createObjectURL(blob);
        }

        if (providerId === 'google') {
            var res = await fetch('https://texttospeech.googleapis.com/v1/text:synthesize?key=' + apiKey, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ input: { text: text.substring(0, 5000) }, voice: { languageCode: 'zh-CN', name: 'cmn-CN-Wavenet-A' }, audioConfig: { audioEncoding: 'MP3' } })
            });
            if (!res.ok) throw new Error('Google TTS 请求失败');
            var data = await res.json();
            return 'data:audio/mp3;base64,' + data.audioContent;
        }

        if (providerId === 'spark') {
            var res = await fetch('https://tts-api.xf-yun.com/v1/tts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                body: JSON.stringify({ model: 'spark-tts', text: text.substring(0, 2000), voice: voice || 'x4_yezi' })
            });
            if (!res.ok) throw new Error('讯飞 TTS 请求失败');
            var data = await res.json();
            if (data.audio) return 'data:audio/mp3;base64,' + data.audio;
            throw new Error('讯飞 TTS 返回为空');
        }

        throw new Error(prov.name + ' 暂不支持 TTS');
    };

        if (window.ideVersions && window.ideCurrentV >= 0 && window.ideVersions[window.ideCurrentV]) {
            currentIDECode = window.ideVersions[window.ideCurrentV];
        } else if (window.ideEditor) {
            currentIDECode = window.ideEditor.getValue();
        }

        isModification = currentIDECode.trim().length > 0;
        msgObj.isModification = isModification;

        var systemPrompt = '你是一个搭载了顶级 Web IDE (Artifacts) 的高级研发引擎。\n【核心运行机制】\n不论用户要求新建项目还是修改现有代码，你都必须**直接输出包含所有修改的 HTML/CSS/JS 代码全文**！\n系统会像 Canvas 一样自动抓取你输出的代码并实时覆写到右侧工作台中。\n**绝不要使用任何 SEARCH/REPLACE 补丁格式，直接以 \x60\x60\x60html 包裹输出最新的完整代码即可。**\n\n' + (currentIDECode ? '【当前 IDE 源码状态】\n请基于以下代码进行修改，并输出完整的最新代码全文：\n\x60\x60\x60html\n' + currentIDECode + '\n\x60\x60\x60' : '');

        messages.unshift({ role: "system", content: systemPrompt });

        if (caps.think && window.config.think) reqOptions.thinking = { type: "enabled" };
        if (caps.search && window.config.search) reqOptions.tools = [{ type: "web_search", max_keyword: 3, force_search: true, limit: 3 }];

        window.currentAbortController = new AbortController();
        window.setButtonState(true);

        try {
            const providerResult = await window.sendToProvider(providerId, window.config.mod, messages, reqOptions, window.currentAbortController.signal);
            const res = providerResult.response;
            const fmt = providerResult.format;

            const reader = res.body.getReader();
            const dec = new TextDecoder();
            let streamBuffer = '';
            let lastRenderTime = 0; 
            
            while(true) {
                const {done, value} = await reader.read();
                if(done) break;
                
                streamBuffer += dec.decode(value, { stream: true });
                const lines = streamBuffer.split('\n');
                streamBuffer = lines.pop(); 
                
                for(let line of lines) {
                    const delta = window.parseStreamDelta(fmt, line);
                    if (!delta) continue;
                    if (delta.done) continue;
                    
                    if (delta.usage) msgObj.usage = delta.usage;
                    if (delta.reasoning) msgObj.reasoning += delta.reasoning;
                    if (delta.content) {
                        msgObj.content += delta.content;
                        if (delta.content.includes('```')) {
                            if (isModification) {
                                if (document.body.classList.contains('preview-open')) {
                                    document.body.classList.remove('preview-open');
                                    window.showToast("正在后台安全修补代码...", `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>`);
                                }
                                const fab = document.getElementById('fab-open-ide');
                                if(fab) fab.style.display = 'none';
                            } else {
                                window.initIDEIfNeeded('');
                            }
                        }
                    }
                    if (delta.annotations) msgObj.annotations = msgObj.annotations.concat(delta.annotations);

                    const now = Date.now();
                    if (now - lastRenderTime > 80) {
                        window.renderOutput(bubble, msgObj, false); 
                        if (!window.isDiffMode) {
                            const marker = '```';
                            const codeRegex = new RegExp(marker + '(?:html|js|css|xml)?\\s*\\n([\\s\\S]*?)(?:' + marker + '|$)', 'gi');
                            let match, lastCode = null;
                            while ((match = codeRegex.exec(msgObj.content)) !== null) lastCode = match[1];
                            if (lastCode !== null && lastCode.trim().length > 0) {
                                msgObj.hasFullCodeRewrite = true;
                            }
                        }
                        if (chat.scrollHeight - chat.scrollTop < 1000) chat.scrollTop = chat.scrollHeight;
                        lastRenderTime = now;
                    }
                }
            }
            
            if (!window.isDiffMode) {
                const marker = '```';
                const codeRegex = new RegExp(marker + '(?:html|js|css|xml)?\\s*\\n([\\s\\S]*?)(?:' + marker + '|$)', 'gi');
                let match, lastCode = null;
                while ((match = codeRegex.exec(msgObj.content)) !== null) lastCode = match[1];
                if (lastCode !== null && lastCode.trim().length > 0) {
                    msgObj.hasFullCodeRewrite = true;
                    if (!isModification && window.ideEditor && window.ideEditor.getValue() !== lastCode) {
                        window.ideEditor.setValue(lastCode);
                        window.ideEditor.setCursor(window.ideEditor.lineCount(), 0);
                    }
                }
            }
            window.renderOutput(bubble, msgObj, true); 

            const codeBoxes = bubble.querySelectorAll('.code-box');
            if (codeBoxes.length > 0) {
                const lastLang = codeBoxes[codeBoxes.length - 1].querySelector('.code-lang')?.textContent?.toLowerCase() || '';
                if (lastLang) {
                    window.currentIdeLang = lastLang;
                    window.updateIdeLangBadge(lastLang);
                }
            }

            session.messages.push(msgObj);
            window.saveSessions();
        } catch(e) { 
            if (e.name === 'AbortError') {
                msgObj.content += "\n\n<span style='color:var(--text-tertiary); font-size:13px'>*[ 已中止 ]*</span>";
                msgObj.isAborted = true;
                window.renderOutput(bubble, msgObj, true);
                session.messages.push(msgObj);
                window.saveSessions();
                window.loadSessionToUI(); 
            } else {
                const errMsg = e._parsedMsg || window.parseProviderError(providerId, e._httpStatus, e._response) || e.message;
                bubble.innerHTML = `<div class="error-message">${errMsg}</div>`;
                window.showToast(errMsg, icons.warning);
            }

        }

    window.runHTML = function(code) {
        const hijacker = `
            <script>
                const _l = console.log, _e = console.error, _w = console.warn;
                function s(lvl, a) {
                    try {
                        const d = Array.from(a).map(i => typeof i === 'object' ? JSON.stringify(i) : String(i)).join(' ');
                        window.parent.postMessage({type: 'mimo_console', lvl, data: d}, '*');
                    } catch(err) {}
                }
                console.log = function(...a) { _l(...a); s('info', a); };
                console.error = function(...a) { _e(...a); s('error', a); };
                console.warn = function(...a) { _w(...a); s('warn', a); };
                window.onerror = function(m, u, l) { s('error', [m + ' (Line ' + l + ')']); return false; };
            <\/script>
        `;
        
        let finalCode = code;
        if (finalCode.toLowerCase().includes('<head>')) {
            finalCode = finalCode.replace('<head>', '<head>' + hijacker);
        } else {
            finalCode = hijacker + finalCode;
        }

        const iframe = document.getElementById('p-frame');
        iframe.srcdoc = finalCode;
        iframe.removeAttribute('src');

    window.renderDiff = function() {
        if (window.ideCurrentV <= 0) {
            alert("这是第一个版本，没有历史记录可比对。");
            window.toggleDiff();
            return;
        }
        const oldCode = window.ideVersions[window.ideCurrentV - 1] || "";
        const newCode = window.ideVersions[window.ideCurrentV] || "";

        if (!window.diffEditorInline) {
            window.diffEditorInline = CodeMirror(document.getElementById('diff-inline-cm'), {
                mode: 'htmlmixed',
                theme: 'dracula',
                lineNumbers: false, 
                gutters: ["diff-gutter-old", "diff-gutter-new"],
                readOnly: true,
                lineWrapping: true
            });
        }

        window.diffEditorInline.clearGutter("diff-gutter-old");
        window.diffEditorInline.clearGutter("diff-gutter-new");
        window.diffEditorInline.eachLine(line => window.diffEditorInline.removeLineClass(line, 'background'));
        document.getElementById('minimap-track').innerHTML = '';

        const oldLines = oldCode.split(/\r?\n/);
        const newLines = newCode.split(/\r?\n/);

        let start = 0;
        while (start < oldLines.length && start < newLines.length && oldLines[start] === newLines[start]) {
            start++;
        }

        let endOld = oldLines.length - 1;
        let endNew = newLines.length - 1;
        while (endOld >= start && endNew >= start && oldLines[endOld] === newLines[endNew]) {
            endOld--;
            endNew--;
        }

        const subOld = oldLines.slice(start, endOld + 1);
        const subNew = newLines.slice(start, endNew + 1);

        const dp = Array(subOld.length + 1);
        for(let i=0; i<=subOld.length; i++) dp[i] = new Int32Array(subNew.length + 1);
        
        for (let i = 1; i <= subOld.length; i++) {
            for (let j = 1; j <= subNew.length; j++) {
                if (subOld[i - 1] === subNew[j - 1]) dp[i][j] = dp[i - 1][j - 1] + 1;
                else dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
            }
        }
        
        let i = subOld.length, j = subNew.length;
        const diff = [];
        
        for (let k = newLines.length - 1; k > endNew; k--) {
            diff.push({ type: 'eq', oldIdx: oldLines.length - newLines.length + k, newIdx: k });
        }
        
        while (i > 0 || j > 0) {
            if (i > 0 && j > 0 && subOld[i - 1] === subNew[j - 1]) {
                diff.push({ type: 'eq', oldIdx: start + i - 1, newIdx: start + j - 1 });
                i--; j--;
            } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
                diff.push({ type: 'add', newIdx: start + j - 1 });
                j--;
            } else if (i > 0 && (j === 0 || dp[i][j - 1] < dp[i - 1][j])) {
                diff.push({ type: 'del', oldIdx: start + i - 1 });
                i--;
            }
        }
        
        for (let k = start - 1; k >= 0; k--) {
            diff.push({ type: 'eq', oldIdx: k, newIdx: k });
        }
        
        diff.reverse();

        let blocks = [];
        let curDels = [], curAdds = [];
        
        for (let op of diff) {
            if (op.type === 'eq') {
                if (curDels.length || curAdds.length) {
                    blocks.push({ type: 'mod', dels: curDels, adds: curAdds });
                    curDels = []; curAdds = [];
                }
                blocks.push({ type: 'eq', op: op });
            } else if (op.type === 'del') { curDels.push(op); }
            else if (op.type === 'add') { curAdds.push(op); }
        }
        if (curDels.length || curAdds.length) blocks.push({ type: 'mod', dels: curDels, adds: curAdds });

        let unifiedText = [];
        let lineMeta = [];
        
        blocks.forEach(b => {
            if (b.type === 'eq') {
                unifiedText.push(oldLines[b.op.oldIdx]);
                lineMeta.push({ oldNum: b.op.oldIdx + 1, newNum: b.op.newIdx + 1, class: '', marker: '' });
            } else {
                let isMod = b.dels.length > 0 && b.adds.length > 0;
                b.dels.forEach(op => {
                    unifiedText.push(oldLines[op.oldIdx]);
                    lineMeta.push({ oldNum: op.oldIdx + 1, newNum: '', class: 'diff-line-del', marker: 'del' });
                });
                b.adds.forEach(op => {
                    unifiedText.push(newLines[op.newIdx]);
                    lineMeta.push({ oldNum: '', newNum: op.newIdx + 1, class: isMod ? 'diff-line-mod-add' : 'diff-line-add', marker: isMod ? 'mod' : 'add' });
                });
            }
        });

        window.diffEditorInline.setValue(unifiedText.join('\n'));

        lineMeta.forEach((meta, idx) => {
            if (meta.class) window.diffEditorInline.addLineClass(idx, 'background', meta.class);
            
            let mOld = document.createElement("div"); mOld.className = "diff-line-num"; mOld.innerText = meta.oldNum;
            let mNew = document.createElement("div"); mNew.className = "diff-line-num"; mNew.innerText = meta.newNum;
            
            if (meta.class === 'diff-line-del') mOld.style.color = '#FF3B30';
            if (meta.class === 'diff-line-add') mNew.style.color = '#34C759';
            if (meta.class === 'diff-line-mod-add') mNew.style.color = '#FFCC00';

            window.diffEditorInline.setGutterMarker(idx, "diff-gutter-old", mOld);
            window.diffEditorInline.setGutterMarker(idx, "diff-gutter-new", mNew);

            if (meta.marker) {
                const markerEl = document.createElement('div');
                markerEl.className = 'diff-minimap-marker';
                markerEl.style.top = ((idx / lineMeta.length) * 100) + '%';
                markerEl.style.height = Math.max(1.5, (1 / lineMeta.length) * 100) + '%';
                if (meta.marker === 'del') markerEl.style.backgroundColor = '#FF3B30';
                else if (meta.marker === 'add') markerEl.style.backgroundColor = '#34C759';
                else if (meta.marker === 'mod') markerEl.style.backgroundColor = '#FFCC00';
                document.getElementById('minimap-track').appendChild(markerEl);
            }
        });

        const track = document.getElementById('minimap-track');
        if (track && !track.dataset.clickBound) {
            track.dataset.clickBound = "true";
            track.addEventListener('mousedown', (e) => {
                if (e.target === track || e.target.classList.contains('diff-minimap-marker')) {
                    const trackHeight = track.clientHeight;
                    const pct = e.offsetY / trackHeight;
                    const info = window.diffEditorInline.getScrollInfo();
                    window.diffEditorInline.scrollTo(null, pct * info.height - (info.clientHeight / 2));
                    e.preventDefault();
                }
            });
        }

        const updateThumb = () => {
            const thumb = document.getElementById('minimap-thumb');
            if(!thumb) return;
            const info = window.diffEditorInline.getScrollInfo();
            const topPct = (info.top / info.height) * 100;
            const hPct = (info.clientHeight / info.height) * 100;
            thumb.style.top = topPct + '%';
            thumb.style.height = hPct + '%';
        };
        
        window.diffEditorInline.off('scroll', updateThumb);
        window.diffEditorInline.on('scroll', updateThumb);

        const thumb = document.getElementById('minimap-thumb');
        if (thumb && !thumb.dataset.dragBound) {
            thumb.dataset.dragBound = "true";
            let isDragging = false, startY = 0, startTop = 0;
            thumb.addEventListener('mousedown', (e) => {
                isDragging = true;
                startY = e.clientY;
                startTop = window.diffEditorInline.getScrollInfo().top;
                document.body.style.userSelect = "none";
                e.preventDefault();
            });
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const info = window.diffEditorInline.getScrollInfo();
                const trackHeight = document.getElementById('minimap-track').clientHeight;
                window.diffEditorInline.scrollTo(null, startTop + (e.clientY - startY) * (info.height / trackHeight));
            });
            window.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    document.body.style.userSelect = "";
                }
            });
        }

        setTimeout(() => {
            window.diffEditorInline.refresh();
            updateThumb();
        }, 50);
    };

    window.updateIDEVersionUI = function() {
        document.getElementById('ide-v-label').innerText = `V${window.ideCurrentV + 1}`;
        document.getElementById('ide-prev-v').disabled = window.ideCurrentV <= 0;
        document.getElementById('ide-next-v').disabled = window.ideCurrentV >= window.ideVersions.length - 1;
        
        const diffBtn = document.getElementById('btn-diff-toggle');
        if (diffBtn) {
            diffBtn.disabled = window.ideCurrentV <= 0;
            diffBtn.style.opacity = window.ideCurrentV <= 0 ? '0.3' : '1';
        }

        const session = window.sessions.find(s => s.id === window.currentSessionId);
        if (session) {
            session.ideVersions = window.ideVersions ? [...window.ideVersions] : [];
            session.ideCurrentV = window.ideCurrentV;
            window.saveSessions(); 
        }
    };

    window.changeVersion = function(step) {
        const target = window.ideCurrentV + step;
        if (target >= 0 && target < window.ideVersions.length) {
            window.ideCurrentV = target;
            window.updateIDEVersionUI();
            if (window.ideEditor) {
                window.ideEditor.setValue(window.ideVersions[target]);
                window.runIDE();
            }
            
            if (window.isDiffMode) {
                if (window.ideCurrentV === 0) window.toggleDiff();
                else window.renderDiff();
            }
        }
    };

    window.switchIDETab = function(tab) {
        document.getElementById('preview-page').dataset.tab = tab;
        document.getElementById('tab-code').classList.toggle('active', tab === 'code');
        document.getElementById('tab-preview').classList.toggle('active', tab === 'preview');
        if (tab === 'code' && window.ideEditor) {
            setTimeout(() => window.ideEditor.refresh(), 50);
        }
    };

    window.clearConsole = function() {
        document.getElementById('console-logs').innerHTML = '';
    };

    window.logToConsole = function(lvl, msg) {
        const logsBox = document.getElementById('console-logs');
        const div = document.createElement('div');
        div.className = 'console-log-item ' + (lvl === 'error' ? 'error' : '');
        div.innerText = msg;
        logsBox.appendChild(div);
        logsBox.scrollTop = logsBox.scrollHeight;
        if (lvl === 'error') window.toggleConsole(true);
    };

    window.currentIdeLang = 'html';
    window.updateIdeLangBadge = function(lang) {
        const badge = document.getElementById('ide-lang-badge');
        const text = document.getElementById('ide-lang-text');
        if (badge && text) {
            text.textContent = lang || 'HTML';
            badge.style.display = lang ? '' : 'none';
        }
    };

    window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'mimo_console') {
            const logsBox = document.getElementById('console-logs');
            const div = document.createElement('div');
            div.className = 'console-log-item ' + (e.data.lvl === 'error' ? 'error' : '');
            div.innerText = e.data.data;
            logsBox.appendChild(div);
            logsBox.scrollTop = logsBox.scrollHeight;

            if (e.data.lvl === 'error') {
                window.toggleConsole(true);
            }
        }
    });
</script>

<div id="apikey-modal">
    <div class="apikey-card">
        <div class="apikey-provider-icon" id="apikey-icon"></div>
        <h3 id="apikey-title">连接模型</h3>
        <p id="apikey-desc">请输入您的 API Key 以启用该厂商模型</p>
        <div class="apikey-input-wrap">
            <input type="password" id="apikey-input" class="apikey-input" placeholder="sk-..." onkeypress="if(event.key==='Enter') window.confirmApiKey()">
            <button class="apikey-toggle-vis" id="apikey-vis-btn" onclick="window.toggleApiKeyVis()"></button>
        </div>
        <div id="apikey-error" class="apikey-error"></div>
        <div class="apikey-actions">
            <button class="apikey-btn apikey-btn-cancel" onclick="window.cancelApiKey()">稍后再说</button>
            <button class="apikey-btn apikey-btn-confirm" onclick="window.confirmApiKey()">确认连接</button>
        </div>
    </div>
</div>
